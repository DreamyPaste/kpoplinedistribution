<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Line Distribution Controller</title>
    <style>
        body {
            background-color: #0d0d0d;
            color: #fff;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 5px;
            font-size: 22px;
            color: #ff4757;
        }

        .instruction {
            color: #aaa;
            font-size: 13px;
            margin-bottom: 15px;
            text-align: center;
        }

        /* SECTION 1: PANEL DISPLAY (Murni Monitor Layout 1000281445.png) */
        .panel-display {
            width: 800px;
            height: 450px;
            background-color: #555555;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 15px;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
            border: 3px solid #222;
            pointer-events: none; /* MENGUNCI LAYAR DISPLAY AGAR TIDAK BISA DIKLIK */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .row-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            gap: 12px;
            max-width: 600px;
        }

        .member-card {
            width: 104px;
            height: 130px;
            background-color: #222;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 8px 4px;
            box-sizing: border-box;
            border: 2px solid transparent;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, order 0.4s ease-out;
        }

        .color-fill {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 0%;
            opacity: 0.4;
            z-index: 1;
            transition: height 0.1s linear;
        }

        .member-card.singing {
            border-color: #ffffff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.7);
            z-index: 2;
        }

        .member-name {
            font-size: 11px;
            font-weight: bold;
            z-index: 2;
            text-shadow: 1px 1px 3px #000;
        }

        .member-time {
            font-size: 16px;
            font-weight: bold;
            z-index: 2;
            text-shadow: 1px 1px 3px #000;
        }

        /* SECTION 2: PANEL CONTROL (Tombol Statis, Gak Bakal Gerak) */
        .panel-control {
            margin-top: 25px;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 12px;
            box-width: 100%;
            max-width: 800px;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .control-title {
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin-bottom: 5px;
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            justify-content: center;
        }

        /* Menyeimbangkan baris kedua agar rapi di tengah */
        @media (min-width: 400px) {
            .button-grid {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
            }
        }

        .singer-btn {
            background-color: #2c3e50;
            color: white;
            border: 2px solid transparent;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            min-width: 110px;
            text-align: center;
            user-select: none;
            transition: all 0.2s ease;
        }

        .singer-btn:hover {
            background-color: #34495e;
        }

        /* Efek Tombol ketika Member Aktif Menyanyi */
        .singer-btn.active {
            background-color: var(--member-color, #ff4757);
            border-color: #fff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            transform: scale(0.95);
        }

        .system-controls {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-top: 5px;
            border-top: 1px solid #333;
            padding-top: 15px;
            width: 100%;
            justify-content: space-between;
        }

        .reset-btn {
            background-color: #555;
            color: white;
            border: none;
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
        }

        .reset-btn:hover {
            background-color: #666;
        }

        #timer {
            font-size: 18px;
            font-weight: bold;
            background: #000;
            padding: 6px 15px;
            border-radius: 4px;
            border: 1px solid #333;
        }
    </style>
</head>
<body>

    <h2>Line Distribution Studio</h2>
    <p class="instruction">Layar display atas terkunci. Tekan tombol nama member di panel control bawah untuk menggerakkan chart secara real-time!</p>

    <!-- 1. PANEL DISPLAY (MURNI MONITOR) -->
    <div class="panel-display">
        <div class="row-container" id="grid-container"></div>
    </div>

    <!-- 2. PANEL CONTROL (STATIS & INTERAKTIF) -->
    <div class="panel-control">
        <div class="control-title">Live Control Pad</div>
        
        <div class="button-grid" id="button-container"></div>

        <div class="system-controls">
            <button class="reset-btn" onclick="resetSimulation()">Reset Data</button>
            <div id="timer">Total: 0.0s</div>
        </div>
    </div>

    <script>
        // Data Member Lengkap
        let members = [
            { id: "therese", name: "Therese", color: "#e74c3c", time: 0 },
            { id: "sunny", name: "Sunny", color: "#2ecc71", time: 0 },
            { id: "yonhee", name: "Yonhee", color: "#f1c40f", time: 0 },
            { id: "krystal", name: "Krystal", color: "#9b59b6", time: 0 },
            { id: "valentina", name: "Valentina", color: "#e84393", time: 0 },
            { id: "hayun", name: "Hayun", color: "#3498db", time: 0 },
            { id: "eunji", name: "Eunji", color: "#fd79a8", time: 0 },
            { id: "bernadette", name: "Bernadette", color: "#e67e22", time: 0 },
            { id: "jiyoung", name: "Jiyoung", color: "#1abc9c", time: 0 }
        ];

        let activeSingers = new Set();
        let animationFrameId = null;
        let lastTime = 0;
        let totalTime = 0;
        let maxLinesValue = 15.0;

        const gridContainer = document.getElementById('grid-container');
        const buttonContainer = document.getElementById('button-container');
        
        const cardElements = {};
        const buttonElements = {};

        // Inisialisasi Elemen Display & Control secara Terpisah
        members.forEach((member, initialIndex) => {
            // Pembuatan Card untuk Panel Display (Atas)
            const card = document.createElement('div');
            card.className = 'member-card';
            card.style.order = initialIndex;

            const fill = document.createElement('div');
            fill.className = 'color-fill';
            fill.style.backgroundColor = member.color;
            
            const nameLabel = document.createElement('div');
            nameLabel.className = 'member-name';
            nameLabel.innerText = member.name;

            const timeLabel = document.createElement('div');
            timeLabel.className = 'member-time';
            timeLabel.innerText = '0.0';

            card.appendChild(fill);
            card.appendChild(nameLabel);
            card.appendChild(timeLabel);
            gridContainer.appendChild(card);
            cardElements[member.id] = card;

            // Pembuatan Tombol untuk Panel Control (Bawah)
            const btn = document.createElement('button');
            btn.className = 'singer-btn';
            btn.innerText = member.name;
            btn.style.setProperty('--member-color', member.color);
            
            // Event klik dipasang di tombol kontrol bawah
            btn.addEventListener('click', function() {
                toggleSinger(member.id);
            });

            buttonContainer.appendChild(btn);
            buttonElements[member.id] = btn;
        });

        // Real-Time Core Updater (Mengatur display atas & status tombol bawah)
        function runRealtimeUpdate() {
            let sortedRankings = [...members].sort((a, b) => b.time - a.time);

            members.forEach(member => {
                const card = cardElements[member.id];
                const btn = buttonElements[member.id];
                
                if (activeSingers.has(member.id)) {
                    card.classList.add('singing');
                    btn.classList.add('active');
                } else {
                    card.classList.remove('singing');
                    btn.classList.remove('active');
                }

                // Update Tinggi Isian Warna Otomatis
                const fillElement = card.querySelector('.color-fill');
                const fillPercentage = totalTime > 0 ? Math.min((member.time / maxLinesValue) * 100, 100) : 0;
                fillElement.style.height = `${fillPercentage}%`;

                // Update Angka Detik Di Monitor Atas
                const timeElement = card.querySelector('.member-time');
                timeElement.innerText = member.time.toFixed(1);

                // Mengatur Urutan Visual Real-time (5 di atas, 4 di bawah otomatis)
                let currentVisualRank = sortedRankings.findIndex(m => m.id === member.id);
                card.style.order = currentVisualRank;
            });
        }

        function toggleSinger(id) {
            if (activeSingers.has(id)) {
                activeSingers.delete(id);
            } else {
                activeSingers.add(id);
            }

            runRealtimeUpdate();

            // Atur putaran waktu (engine)
            if (activeSingers.size > 0 && !animationFrameId) {
                lastTime = performance.now();
                animationFrameId = requestAnimationFrame(updateLoop);
            } else if (activeSingers.size === 0 && animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
        }

        function updateLoop(now) {
            if (activeSingers.size === 0) {
                animationFrameId = null;
                return;
            }

            let dt = (now - lastTime) / 1000;
            lastTime = now;

            totalTime += dt;
            document.getElementById('timer').innerText = `Total: ${totalTime.toFixed(1)}s`;

            activeSingers.forEach(id => {
                let member = members.find(m => m.id === id);
                if (member) {
                    member.time += dt;
                    if (member.time > maxLinesValue) {
                        maxLinesValue = member.time + 5; 
                    }
                }
            });

            runRealtimeUpdate();
            animationFrameId = requestAnimationFrame(updateLoop);
        }

        function resetSimulation() {
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
            totalTime = 0;
            maxLinesValue = 15.0;
            activeSingers.clear();
            members.forEach(m => m.time = 0);
            
            document.getElementById('timer').innerText = `Total: 0.0s`;
            runRealtimeUpdate();
        }

        // Jalankan render awal
        runRealtimeUpdate();
    </script>
</body>
</html>
