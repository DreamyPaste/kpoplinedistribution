<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Line Distribution Studio</title>
    <style>
        body {
            background-color: #0d0d0d;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 12px;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        h2 {
            margin: 5px 0 2px 0;
            font-size: 18px;
            color: #ff4757;
            text-align: center;
        }

        .instruction {
            color: #aaa;
            font-size: 11px;
            margin-bottom: 12px;
            text-align: center;
        }

        /* WRAPPER UNTUK AUTO-SCALING DI HP */
        .display-wrapper {
            width: 100%;
            max-width: 800px;
            aspect-ratio: 16 / 9; /* Menjaga aspek rasio video 1000281445.png tetap sempurna */
            position: relative;
            background-color: #555555;
            border: 2px solid #222;
            border-radius: 8px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            overflow: hidden;
        }

        /* SECTION 1: PANEL DISPLAY (Murni Monitor) */
        .panel-display {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 3.5%;
            padding: 3%;
            box-sizing: border-box;
            pointer-events: none; /* Mengunci total agar aman saat screen record */
        }

        .row-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            gap: 1.5%;
            max-width: 600px;
        }

        /* KARTU MEMBER MENGGUNAKAN PERSENTASE AGAR FLEXIBEL DI HP */
        .member-card {
            width: 17%;
            aspect-ratio: 4 / 5; /* Mempertahankan rasio 4:5 di semua ukuran layar */
            background-color: #222;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 1.5% 0.5%;
            box-sizing: border-box;
            border: 1px solid transparent;
            transition: border-color 0.2s, box-shadow 0.2s, order 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .color-fill {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 0%;
            opacity: 0.45;
            z-index: 1;
            transition: height 0.1s linear;
        }

        .member-card.singing {
            border-color: #ffffff;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.8);
            z-index: 2;
        }

        .member-name {
            font-size: 1.8vw; /* Font mengecil otomatis menyesuaikan layar monitor */
            font-weight: bold;
            z-index: 2;
            text-shadow: 1px 1px 2px #000;
        }

        /* Responsivitas font nama untuk layar laptop/tablet */
        @media (min-width: 600px) {
            .member-name { font-size: 11px; }
        }

        .member-time {
            font-size: 2.6vw;
            font-weight: bold;
            z-index: 2;
            text-shadow: 1px 1px 2px #000;
        }

        @media (min-width: 600px) {
            .member-time { font-size: 16px; }
        }

        /* SECTION 2: PANEL CONTROL (Sangat Ramah Sentuhan Jari) */
        .panel-control {
            width: 100%;
            max-width: 800px;
            margin-top: 15px;
            background: #161616;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #252525;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .control-title {
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #666;
            text-align: center;
        }

        /* Grid Tombol yang Fleksibel untuk Layar HP */
        .button-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 kolom pas untuk jempol di HP mode vertikal */
            gap: 8px;
            width: 100%;
        }

        @media (min-width: 500px) {
            .button-grid {
                grid-template-columns: repeat(5, 1fr); /* Otomatis jadi 5 kolom kalau di tablet/mode miring */
            }
        }

        .singer-btn {
            background-color: #1f2d3d;
            color: white;
            border: 2px solid transparent;
            padding: 12px 8px; /* Lebih tebal agar mudah ditekan */
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            text-align: center;
            user-select: none;
            transition: transform 0.1s, background-color 0.2s;
        }

        /* Efek feedback sentuhan di HP */
        .singer-btn:active {
            transform: scale(0.92);
        }

        .singer-btn.active {
            background-color: var(--member-color, #ff4757);
            border-color: #fff;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.2);
        }

        /* Sistem kontrol tombol reset & timer */
        .system-controls {
            display: flex;
            gap: 15px;
            align-items: center;
            border-top: 1px solid #252525;
            padding-top: 12px;
            width: 100%;
            justify-content: space-between;
        }

        .reset-btn {
            background-color: #333;
            color: #eee;
            border: none;
            padding: 10px 16px;
            font-size: 13px;
            cursor: pointer;
            border-radius: 6px;
            font-weight: bold;
        }

        #timer {
            font-size: 16px;
            font-weight: bold;
            background: #000;
            padding: 6px 14px;
            border-radius: 6px;
            border: 1px solid #252525;
        }
    </style>
</head>
<body>

    <h2>Line Distribution Studio</h2>
    <p class="instruction">Monitor atas aman dari sentuhan. Ketuk tombol nama di bawah untuk live control!</p>

    <!-- CONTAINER DISPLAY YANG OTOMATIS MENGIKUTI UKURAN LAYAR HP -->
    <div class="display-wrapper">
        <div class="panel-display">
            <div class="row-container" id="grid-container"></div>
        </div>
    </div>

    <!-- PANEL UTAMA UNTUK JARI HP -->
    <div class="panel-control">
        <div class="control-title">Live Control Pad</div>
        
        <div class="button-grid" id="button-container"></div>

        <div class="system-controls">
            <button class="reset-btn" onclick="resetSimulation()">Reset Data</button>
            <div id="timer">Total: 0.0s</div>
        </div>
    </div>

    <script>
        let members = [
            { id: "therese", name: "Therese", color: "#e74c3c", time: 0 },
            { id: "sunny", name: "Sunny", color: "#2ecc71", time: 0 },
            { id: "yonhee", name: "Yonhee", color: "#f1c40f", time: 0 },
            { id: "krystal", name: "Krystal", color: "#9b59b6", time: 0 },
            { id: "valentina", name: "Valentina", color: "#e84393", time: 0 },
            { id: "hayun", name: "Hayun", color: "#3498db", time: 0 },
            { id: "eunji", name: "Eunji", color: "#fd79a8", time: 0 },
            { id: "bernadette", name: "Bernadette", color: "#e67e22", time: 0 },
            { id: "jiyoung", name: "Jiyoung", color: "#1abc9c", time: 0 }
        ];

        let activeSingers = new Set();
        let animationFrameId = null;
        let lastTime = 0;
        let totalTime = 0;
        let maxLinesValue = 15.0;

        const gridContainer = document.getElementById('grid-container');
        const buttonContainer = document.getElementById('button-container');
        
        const cardElements = {};
        const buttonElements = {};

        // Setup elemen awal
        members.forEach((member, initialIndex) => {
            const card = document.createElement('div');
            card.className = 'member-card';
            card.style.order = initialIndex;

            const fill = document.createElement('div');
            fill.className = 'color-fill';
            fill.style.backgroundColor = member.color;
            
            const nameLabel = document.createElement('div');
            nameLabel.className = 'member-name';
            nameLabel.innerText = member.name;

            const timeLabel = document.createElement('div');
            timeLabel.className = 'member-time';
            timeLabel.innerText = '0.0';

            card.appendChild(fill);
            card.appendChild(nameLabel);
            card.appendChild(timeLabel);
            gridContainer.appendChild(card);
            cardElements[member.id] = card;

            const btn = document.createElement('button');
            btn.className = 'singer-btn';
            btn.innerText = member.name;
            btn.style.setProperty('--member-color', member.color);
            
            btn.addEventListener('click', function() {
                toggleSinger(member.id);
            });

            buttonContainer.appendChild(btn);
            buttonElements[member.id] = btn;
        });

        function runRealtimeUpdate() {
            let sortedRankings = [...members].sort((a, b) => b.time - a.time);

            members.forEach(member => {
                const card = cardElements[member.id];
                const btn = buttonElements[member.id];
                
                if (activeSingers.has(member.id)) {
                    card.classList.add('singing');
                    btn.classList.add('active');
                } else {
                    card.classList.remove('singing');
                    btn.classList.remove('active');
                }

                const fillElement = card.querySelector('.color-fill');
                const fillPercentage = totalTime > 0 ? Math.min((member.time / maxLinesValue) * 100, 100) : 0;
                fillElement.style.height = `${fillPercentage}%`;

                const timeElement = card.querySelector('.member-time');
                timeElement.innerText = member.time.toFixed(1);

                let currentVisualRank = sortedRankings.findIndex(m => m.id === member.id);
                card.style.order = currentVisualRank;
            });
        }

        function toggleSinger(id) {
            if (activeSingers.has(id)) {
                activeSingers.delete(id);
            } else {
                activeSingers.add(id);
            }

            runRealtimeUpdate();

            if (activeSingers.size > 0 && !animationFrameId) {
                lastTime = performance.now();
                animationFrameId = requestAnimationFrame(updateLoop);
            } else if (activeSingers.size === 0 && animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
        }

        function updateLoop(now) {
            if (activeSingers.size === 0) {
                animationFrameId = null;
                return;
            }

            let dt = (now - lastTime) / 1000;
            lastTime = now;

            totalTime += dt;
            document.getElementById('timer').innerText = `Total: ${totalTime.toFixed(1)}s`;

            activeSingers.forEach(id => {
                let member = members.find(m => m.id === id);
                if (member) {
                    member.time += dt;
                    if (member.time > maxLinesValue) {
                        maxLinesValue = member.time + 5; 
                    }
                }
            });

            runRealtimeUpdate();
            animationFrameId = requestAnimationFrame(updateLoop);
        }

        function resetSimulation() {
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
            totalTime = 0;
            maxLinesValue = 15.0;
            activeSingers.clear();
            members.forEach(m => m.time = 0);
            
            document.getElementById('timer').innerText = `Total: 0.0s`;
            runRealtimeUpdate();
        }

        runRealtimeUpdate();
    </script>
</body>
</html>
